spring.application.name=security-event-platform

spring.datasource.url=jdbc:postgresql://localhost:55432/security_platform
spring.datasource.username=security_user
spring.datasource.password=security_pass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#=============================================================================#

spring.kafka.bootstrap-servers=localhost:29092

spring.kafka.consumer.group-id=security-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*